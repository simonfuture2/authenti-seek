# AuthentiSeal dApp Store Publishing Configuration
# Documentation: https://docs.solanamobile.com/dapp-publishing/prepare

# ============================================
# PUBLISHER SECTION (One-time setup)
# ============================================
publisher:
  # Your publisher name (will appear on dApp Store)
  name: "AuthentiSeal"

  # Publisher website
  website: "https://www.authentiseal.xyz"

  # Contact email for app review team
  email: "simon@w3mct.club"

  # Publisher address (Solana wallet that owns Publisher NFT)
  address: "" # TODO: Add your Solana wallet address

# ============================================
# APP SECTION (One-time per app)
# ============================================
app:
  # Unique app identifier (cannot be changed after first publish)
  # Format: reverse domain notation
  package_name: "app.authentiseal.coa"

  # App name displayed on dApp Store
  name: "AuthentiSeal"

  # Short tagline (max 80 characters)
  short_description: "Blockchain Certificates of Authenticity for Physical Products (RWA)"

  # Full description (max 4000 characters)
  long_description: |
    AuthentiSeal is the premier Certificate of Authenticity (COA) platform built on Solana.

    🔐 VERIFY AUTHENTICITY
    Scan QR codes or NFC tags to instantly verify product authenticity against blockchain records.

    📜 ISSUE CERTIFICATES  
    Create beautiful, tamper-proof certificates with AI-assisted descriptions and custom seals.

    🎨 MINT AS NFTS
    Store certificates on-chain as visual NFTs or privacy-preserving memo records.

    ✅ AI-POWERED VERIFICATION
    Advanced image comparison and attribute matching for comprehensive authenticity checks.

    💳 PAY WITH SOL
    Purchase credits using Solana for certificate creation and verification.

    Built for the Solana Seeker and optimized for mobile-first experience.

  # App category
  category: "utilities"

  # Content rating
  content_rating: "everyone"

  # App icon (512x512 PNG)
  icon: "media/icon-512.png"

  # Feature banner (1200x600 PNG)
  banner: "media/banner-1200x600.png"

  # Screenshots (up to 8, recommended 1080x1920 for mobile)
  screenshots:
    - "media/screenshot-1-landing.png"
    - "media/screenshot-2-verify.png"
    - "media/screenshot-3-certificate.png"
    - "media/screenshot-4-mint.png"

# ============================================
# RELEASE SECTION (Per version)
# ============================================
release:
  # Version code (must increment with each release)
  version_code: 1

  # Version name (human readable)
  version_name: "1.0.0"

  # Path to signed release APK
  apk: "files/authentiseal-v1.0.0.apk"

  # Minimum Android SDK version
  min_sdk: 24

  # Target Android SDK version
  target_sdk: 34

  # Release notes (shown to users)
  release_notes: |
    Initial release of AuthentiSeal for Solana dApp Store.

    Features:
    - Certificate creation with AI-assisted descriptions
    - QR code and NFC verification
    - NFT minting via Metaplex
    - Privacy memo mode for cost-efficient storage
    - Mobile Wallet Adapter support
    - Credit system with SOL payments

  # Testing instructions for app review team (not public)
  testing_instructions: |
    1. Connect a Solana wallet (Phantom or Solflare recommended)
    2. Navigate to "Create COA" to test certificate creation
    3. Use the QR scanner in "Verify" to scan a certificate
    4. Test the wallet connection on Android with MWA

    Test wallet: Request devnet SOL from faucet if needed.
    No special test accounts required - app uses Devnet.

# ============================================
# LOCALIZATION (Optional)
# ============================================
localization:
  default_locale: "en-US"
  supported_locales:
    - "en-US"

# ============================================
# PERMISSIONS & FEATURES
# ============================================
permissions:
  - android.permission.INTERNET
  - android.permission.CAMERA # For QR scanning
  - android.permission.NFC # For NFC tag reading

features:
  - name: "android.hardware.camera"
    required: false
  - name: "android.hardware.nfc"
    required: false
