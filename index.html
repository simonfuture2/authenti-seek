<!doctype html>
<html lang="en">

    <!-- Mobile App Meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AuthentiSeal" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="AuthentiSeal — Know it's real before you buy" />

    <meta property="og:site_name" content="AuthentiSeal" />

      {
        "@context": "https://schema.org",

        "name": "AuthentiSeal",
        "url": "https://authentiseal.xyz/",
